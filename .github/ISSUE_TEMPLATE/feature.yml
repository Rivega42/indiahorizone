name: ✨ Feature
description: Новая функциональность
title: '[M?.?.?] [P?] feat(?): '
labels: ['enhancement']
body:
  - type: dropdown
    id: priority
    attributes:
      label: Приоритет
      options: ['P0 Critical', 'P1 High', 'P2 Medium', 'P3 Low']
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Для кого
      multiple: true
      options: ['Клиент', 'Гид', 'Менеджер', 'Concierge', 'Управляющий']
  - type: textarea
    id: what
    attributes:
      label: Что нужно сделать
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Зачем (ценность)
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Критерии приёмки (Definition of Done)
      placeholder: '- [ ] ...'
