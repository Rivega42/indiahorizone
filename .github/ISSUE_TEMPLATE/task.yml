name: ✅ Задача
description: Обычная рабочая задача
title: "[TASK] "
labels: ["статус: бэклог"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Тип
      options:
        - "тип: рефакторинг"
        - "тип: документация"
        - "тип: тех-долг"
        - "тип: инфра"
    validations:
      required: true
  - type: dropdown
    id: epic
    attributes:
      label: Эпик
      options:
        - EPIC-1
        - EPIC-2
        - EPIC-3
        - не относится
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Приоритет
      options: ["P0", "P1", "P2", "P3"]
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Размер
      options: ["XS", "S", "M", "L", "XL"]
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Компонент
      options:
        - web
        - mobile
        - api
        - db
        - devops
        - ai
        - другое
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Описание
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
