"компонент: web":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/web/**"
          - "packages/ui/**"
          - "src/web/**"

"компонент: mobile":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/mobile/**"
          - "ios/**"
          - "android/**"

"компонент: api":
  - changed-files:
      - any-glob-to-any-file:
          - "apps/api/**"
          - "src/api/**"
          - "src/server/**"

"компонент: db":
  - changed-files:
      - any-glob-to-any-file:
          - "**/migrations/**"
          - "**/prisma/**"
          - "**/schema.prisma"
          - "**/alembic/**"

"компонент: devops":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "infra/**"
          - "Dockerfile*"
          - "docker-compose*.yml"
          - ".pre-commit-config.yaml"

"компонент: ai":
  - changed-files:
      - any-glob-to-any-file:
          - "packages/ai/**"
          - "docs/prompts/**"
          - "docs/ai/**"

"тип: документация":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

"тип: тесты":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.test.*"
          - "**/*.spec.*"
          - "tests/**"
          - "__tests__/**"
