name: Auto-labels and project status

on:
  issues:
    types: [opened, edited, labeled, unlabeled, assigned, closed, reopened]
  pull_request:
    types: [opened, ready_for_review, closed, converted_to_draft, reopened]

permissions:
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER || github.repository_owner }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { run } = await import('${{ github.workspace }}/scripts/automation/auto-labels.mjs');
            await run({ github, context });
