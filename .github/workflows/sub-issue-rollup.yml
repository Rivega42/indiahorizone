name: Sub-issue progress rollup

on:
  issues:
    types: [closed, reopened]
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read
  repository-projects: write

jobs:
  rollup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER || github.repository_owner }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { run } = await import('${{ github.workspace }}/scripts/automation/rollup.mjs');
            await run({ github, context });
