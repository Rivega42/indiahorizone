name: Epic board sync

on:
  issues:
    types: [opened, edited, closed]
  schedule:
    - cron: '0 */6 * * *'

permissions:
  issues: write
  contents: read
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'schedule' || contains(github.event.issue.labels.*.name, 'тип: эпик') }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER || github.repository_owner }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { run } = await import('${{ github.workspace }}/scripts/automation/epic-sync.mjs');
            await run({ github, context });
