# Deploy apps/web to dev-сервер 2.56.241.126
#
# ВАЖНО: Docker образ строится здесь, в GHA, и пушится в GHCR.
#        На сервере — только docker pull + restart (без --build).
#        Это решает проблему таймаута при build на сервере (issue: build >15 мин).
#
# Issue: #320 [devops:vika]
# Триггеры:
#   - push в main → авто-deploy
#   - workflow_dispatch (с веткой) → ручной deploy любой ветки для PR-ревью
#
# Vika setup перед первым запуском:
#   1. Settings → Secrets and variables → Actions → добавить:
#      - DEV_SSH_HOST = 2.56.241.126
#      - DEV_SSH_USER = root (или ubuntu — Vika подтвердит)
#      - DEV_SSH_KEY  = приватный SSH-ключ (один раз сгенерировать пару,
#                       публичный — на сервер в ~/.ssh/authorized_keys,
#                       приватный — сюда)
#   2. GITHUB_TOKEN автоматически имеет packages:write (permissions ниже)
#   3. На сервере: git clone, см. issue #320 шаг 2
#
# Структура на сервере:
#   /opt/indiahorizone/
#     deploy/                   ← клон репо (этот workflow git pull'ит сюда)
#     docker-compose.dev.yml    ← compose-файл (готовит Vika по issue #320)

name: Deploy to dev (2.56.241.126)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Ветка для деплоя (main, feature/..., и т.д.)'
        required: false
        default: 'main'

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push Docker image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/rivega42/indiahorizone-web
          tags: |
            type=raw,value=dev

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH deploy (pull & restart)
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Echo deploy params
        run: |
          echo "Branch: ${{ github.event.inputs.branch || github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "SHA: ${{ github.sha }}"
          echo "Image: ghcr.io/rivega42/indiahorizone-web:dev"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
            cd /opt/indiahorizone/deploy

            echo "→ fetching latest"
            git fetch origin --prune
            echo "→ checking out $BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "→ pulling fresh image from GHCR"
            docker pull ghcr.io/rivega42/indiahorizone-web:dev

            echo "→ restarting containers (no build)"
            cd /opt/indiahorizone
            docker compose --env-file .env -f docker-compose.dev.yml up -d --no-build api web

            echo "→ running migrations"
            docker compose --env-file .env -f docker-compose.dev.yml run --rm api \
              sh -c 'cd /app/apps/api && /app/apps/api/node_modules/.bin/prisma migrate deploy' || true

            echo "→ wait for healthy (max 60s)"
            for i in $(seq 1 12); do
              status=$(docker inspect -f '{{.State.Health.Status}}' indiahorizone-web-dev 2>/dev/null || echo "missing")
              echo "  attempt $i: $status"
              if [ "$status" = "healthy" ]; then break; fi
              sleep 5
            done

            echo "→ smoke-test localhost:3010"
            curl -fsS -o /dev/null -w "HTTP %{http_code}\n" http://localhost:3010/ || \
              (echo "smoke-test FAILED"; docker logs indiahorizone-web-dev --tail 50; exit 1)

            echo "✓ deploy ok"
