name: Path + size labeler

# Лейбл-система:
# - auto-label-pr.yml — лейблит по ветке-prefix (feature/, fix/, claude/...)
# - path-size-labeler.yml (этот) — лейблит по changed-files (компонент: web/api/...) + размеру PR (size: S/M/L/XL)
# Оба workflow'а параллельны, лейблы не конфликтуют.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  path-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
        continue-on-error: true

  size-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size: XS'
          xs_max_size: '10'
          s_label: 'size: S'
          s_max_size: '100'
          m_label: 'size: M'
          m_max_size: '500'
          l_label: 'size: L'
          l_max_size: '1000'
          xl_label: 'size: XL'
          fail_if_xl: 'false'
          message_if_xl: |
            Этот PR превышает 1000 строк. Рекомендуется разбить на меньшие PR для удобства ревью.
